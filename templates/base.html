<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR Analytics Enterprise{% endblock %}</title>

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Tailwind CSS (CDN for development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        body {
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="font-sans text-slate-800 antialiased h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-slate-800">
            <i class="fas fa-layer-group text-indigo-500 text-xl mr-3"></i>
            <span class="text-white font-semibold text-lg tracking-wide">HR Analytics</span>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li>
                    <a href="/dashboard"
                        class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors {% if request.path == '/dashboard' or request.path == '/' %}bg-indigo-600 text-white hover:bg-indigo-700{% endif %}">
                        <i class="fas fa-desktop w-6 text-center mr-3"></i>
                        <span class="font-medium">Dashboard Ringkasan</span>
                    </a>
                </li>
                <li>
                    <a href="/predict"
                        class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors {% if request.path == '/predict' %}bg-indigo-600 text-white hover:bg-indigo-700{% endif %}">
                        <i class="fas fa-brain w-6 text-center mr-3"></i>
                        <span class="font-medium">Prediksi AI</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- User Profile -->
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center">
                <img src="https://ui-avatars.com/api/?name=Admin+HR&background=4f46e5&color=fff&rounded=true"
                    alt="Admin" class="w-10 h-10 rounded-full border-2 border-slate-700">
                <div class="ml-3">
                    <p class="text-sm font-medium text-white">Admin HR</p>
                    <p class="text-xs text-slate-400">Wahyu Sri Aryo Pangestu</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10">
            <div>
                <h1 class="text-xl font-bold text-slate-800">{% block page_title %}{% endblock %}</h1>
            </div>
            <div
                class="flex items-center text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                <i class="fas fa-building mr-2 text-indigo-500"></i> Wahyu Sri Aryo Pangestu
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
            <div class="max-w-7xl mx-auto">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

</body>

</html>
