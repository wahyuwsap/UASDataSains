<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR Analytics Enterprise{% endblock %}</title>

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Tailwind CSS (CDN for development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            100: '#E9BCB4', // Light pinkish
                            500: '#E07F69', // Primary Coral
                            700: '#c5614d', 
                        },
                        accent: {
                            500: '#BCA763', // Gold/Ochre
                            700: '#9e8c4e',
                        },
                        sand: {
                            100: '#f5f4eb',
                            200: '#ebe8d6',
                            500: '#D7D3B0', // Beige/Sand
                        },
                        earth: {
                            500: '#755F2F', // Olive/Brown for text and dark accents
                            800: '#4f3e1b',
                            900: '#3a2d13',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #BCA763;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9e8c4e;
        }

        body {
            background-color: #f5f4eb;
        }
    </style>
</head>

<body class="font-sans text-earth-800 antialiased h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-earth-900 text-sand-500 flex flex-col transition-all duration-300">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 bg-earth-900 border-b border-earth-800">
            <i class="fas fa-layer-group text-brand-500 text-xl mr-3"></i>
            <span class="text-white font-semibold text-lg tracking-wide">HR Analytics</span>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li>
                    <a href="/dashboard"
                        class="flex items-center px-6 py-3 hover:bg-earth-800 hover:text-white transition-colors {% if request.path == '/dashboard' or request.path == '/' %}bg-brand-500 text-white hover:bg-brand-700{% endif %}">
                        <i class="fas fa-desktop w-6 text-center mr-3"></i>
                        <span class="font-medium">Dashboard Ringkasan</span>
                    </a>
                </li>
                <li>
                    <a href="/predict"
                        class="flex items-center px-6 py-3 hover:bg-earth-800 hover:text-white transition-colors {% if request.path == '/predict' %}bg-brand-500 text-white hover:bg-brand-700{% endif %}">
                        <i class="fas fa-brain w-6 text-center mr-3"></i>
                        <span class="font-medium">Prediksi AI</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- User Profile -->
        <div class="p-4 border-t border-earth-800">
            <div class="flex items-center">
                <img src="https://ui-avatars.com/api/?name=Admin+HR&background=4f46e5&color=fff&rounded=true"
                    alt="Admin" class="w-10 h-10 rounded-full border-2 border-earth-500">
                <div class="ml-3">
                    <p class="text-sm font-medium text-white">Admin HR</p>
                    <p class="text-xs text-accent-700">Wahyu Sri Aryo Pangestu</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-sand-500 flex items-center justify-between px-8 shadow-sm z-10">
            <div>
                <h1 class="text-xl font-bold text-earth-800">{% block page_title %}{% endblock %}</h1>
            </div>
            <div
                class="flex items-center text-sm font-medium text-earth-500 bg-sand-200 px-3 py-1.5 rounded-full border border-sand-500">
                <i class="fas fa-building mr-2 text-brand-500"></i> Wahyu Sri Aryo Pangestu
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto bg-sand-100 p-8">
            <div class="max-w-7xl mx-auto">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

</body>

</html>
