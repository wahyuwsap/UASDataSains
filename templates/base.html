<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aplikasi HR Jaya Maju{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" data-aos="fade-right" data-aos-duration="800">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
                <h2>HR Analytics</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
                    <i class="fas fa-desktop"></i> <span>Dashboard Data</span>
                </a>
                <a href="/predict" class="nav-item {% if request.path == '/predict' %}active{% endif %}">
                    <i class="fas fa-robot"></i> <span>Prediksi (AI)</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+HR&background=4361ee&color=fff" alt="Admin" class="avatar">
                    <div class="user-info">
                        <h4>Admin HR</h4>
                        <p>Jaya Maju</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar" data-aos="fade-down" data-aos-duration="600" data-aos-delay="100">
                <div class="topbar-left">
                    <h1>{% block page_title %}{% endblock %}</h1>
                    <p class="subtitle">Sistem Analitik Retensi Karyawan</p>
                </div>
                <div class="company-badge">
                    <i class="fas fa-building"></i> Jaya Jaya Maju
                </div>
            </header>
            
            <div class="content-wrapper" data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
